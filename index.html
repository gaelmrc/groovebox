<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Groovebox</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family: "Segoe UI", system-ui, sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#222,#111 60%,#000);
color:white;
}

.container{
text-align:center;
padding:40px;
}

.logo{
font-size:48px;
font-weight:700;
letter-spacing:2px;
margin-bottom:10px;
}

.subtitle{
opacity:.7;
margin-bottom:40px;
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.app-button{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

width:220px;
height:120px;

text-decoration:none;
color:white;

border-radius:14px;

background:linear-gradient(145deg,#1e1e1e,#101010);
border:1px solid #333;

transition:.25s;

box-shadow:
0 0 0 rgba(0,0,0,0),
inset 0 0 12px rgba(255,255,255,0.05);
}

.app-button:hover{

transform:translateY(-4px);

box-shadow:
0 8px 25px rgba(0,0,0,0.6),
0 0 20px rgba(45,127,249,0.5);

border:1px solid #2d7ff9;
}

.icon{
font-size:26px;
margin-bottom:8px;
}

.label{
font-weight:600;
}

.desc{
font-size:13px;
opacity:.7;
margin-top:4px;
}

.footer{
margin-top:50px;
font-size:12px;
opacity:.5;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">GROOVEBOX</div>
<div class="subtitle">Chord Loop & Beat Sequencer</div>

<div class="buttons">

<a class="app-button" href="./pc/">
<div class="icon">💻</div>
<a href="./pc/groovebox_pc.html">Version PC</a>
<div class="desc">Interface complète</div>
</a>

<a class="app-button" href="./android/">
<div class="icon">📱</div>
<a href="./android/groovebox_android.html">Version Android</a>
<div class="desc">Interface tactile</div>
</a>

</div>

<div class="footer">
Groovebox Web App
</div>

</div>

</body>
</html>
