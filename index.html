<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groovebox</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #111;
      color: white;
    }
    h1 {
      margin-bottom: 30px;
    }
    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 10px;
      background: #2d7ff9;
      color: white;
      font-weight: bold;
    }
    a:hover {
      background: #1f63c7;
    }
  </style>
</head>
<body>
  <h1>Groovebox</h1>
  <div class="buttons">
    <a href="./android/">Version Android</a>
    <a href="./pc/">Version PC</a>
  </div>
</body>
</html>
